    <text x="92" y="50" fill="#E0E0E0" font-family="monospace" font-size="7" text-anchor="end">GND</text>
    <text x="92" y="65" fill="#E0E0E0" font-family="monospace" font-size="7" text-anchor="end">VCC</text>
