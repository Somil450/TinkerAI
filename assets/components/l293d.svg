    <rect x="36" y="25" width="4" height="4" fill="#9E9E9E"/><rect x="80" y="25" width="4" height="4" fill="#9E9E9E"/>
    <rect x="36" y="32" width="4" height="4" fill="#9E9E9E"/><rect x="80" y="32" width="4" height="4" fill="#9E9E9E"/>
