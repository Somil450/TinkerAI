    <rect x="32" y="86" width="56" height="8" fill="#424242"/>
    <circle cx="35" cy="90" r="2" fill="#FFC107"/>
    <circle cx="45" cy="90" r="2" fill="#FFC107"/>
    <circle cx="55" cy="90" r="2" fill="#FFC107"/>
    <circle cx="65" cy="90" r="2" fill="#FFC107"/>
