<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 100" width="120" height="100">
    <rect x="4" y="4" width="112" height="92" rx="4" fill="#D32F2F" stroke="#B71C1C" stroke-width="2"/>
