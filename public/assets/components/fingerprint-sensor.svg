  </defs>
  <rect x="5" y="15" width="120" height="75" rx="4" fill="#212121" stroke="#000000" stroke-width="1.5" filter="url(#sh-fingerprint-sensor)"/>
  
  <!-- PIN HEADER BLACK BASE -->
  <rect x="33.0" y="6" width="60" height="14" rx="2" fill="#1a1a1a" stroke="#333"/>
  
        <rect x="37.0" y="7" width="8" height="10" fill="#bdbdbd" rx="1"/>
        <text x="41.0" y="5" text-anchor="middle" fill="#fff" font-size="5" font-weight="bold" font-family="Arial,sans-serif">VCC</text>
        
        <rect x="51.0" y="7" width="8" height="10" fill="#bdbdbd" rx="1"/>
        <text x="55.0" y="5" text-anchor="middle" fill="#fff" font-size="5" font-weight="bold" font-family="Arial,sans-serif">GND</text>
        
        <rect x="65.0" y="7" width="8" height="10" fill="#bdbdbd" rx="1"/>
        <text x="69.0" y="5" text-anchor="middle" fill="#fff" font-size="5" font-weight="bold" font-family="Arial,sans-serif">TX</text>
        
        <rect x="79.0" y="7" width="8" height="10" fill="#bdbdbd" rx="1"/>
        <text x="83.0" y="5" text-anchor="middle" fill="#fff" font-size="5" font-weight="bold" font-family="Arial,sans-serif">RX</text>
        
  
  <!-- CUSTOM GRAPHICS -->
  <rect x="45" y="30" width="40" height="40" fill="#424242" rx="4"/><path d="M55,40 A10,10 0 1,1 75,40 M52,45 A13,13 0 1,1 78,45 M49,50 A16,16 0 1,1 81,50" stroke="#00e676" stroke-width="1.5" fill="none"/>
  
