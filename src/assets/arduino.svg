<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 220" width="300" height="220">
  <defs>
    <!-- Metallic gradient for USB -->
    <linearGradient id="usbGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#DCDCDC" />
      <stop offset="100%" stop-color="#808080" />
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Main PCB Board (Tinkercad Teal color) -->
  <path d="M 10 10 L 270 10 A 15 15 0 0 1 285 25 L 285 200 A 15 15 0 0 1 270 215 L 20 215 A 15 15 0 0 1 5 200 L 5 25 A 15 15 0 0 1 10 10 Z" fill="#007982" filter="url(#dropShadow)" />
  <!-- PCB Bevel / Edge highlight -->
  <path d="M 10 10 L 270 10 A 15 15 0 0 1 285 25 L 285 200 A 15 15 0 0 1 270 215 L 20 215 A 15 15 0 0 1 5 200 L 5 25 A 15 15 0 0 1 10 10 Z" fill="none" stroke="#00939d" stroke-width="2" />

  <!-- Mounting Holes with gold plating -->
  <circle cx="20" cy="25" r="5" fill="#1A1A1A" stroke="#D4AF37" stroke-width="2" />
  <circle cx="270" cy="25" r="5" fill="#1A1A1A" stroke="#D4AF37" stroke-width="2" />
  <circle cx="270" cy="200" r="5" fill="#1A1A1A" stroke="#D4AF37" stroke-width="2" />
  <circle cx="20" cy="200" r="5" fill="#1A1A1A" stroke="#D4AF37" stroke-width="2" />

  <!-- Silkscreen Graphics (White lines & text) -->
  <!-- Arduino Infinity Logo -->
  <path d="M 135 60 a 10 10 0 1 1 -20 0 a 10 10 0 1 1 20 0 z m 30 0 a 10 10 0 1 1 -20 0 a 10 10 0 1 1 20 0 z" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.8" />
  <text x="130" y="64" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.8">-</text>
  <text x="160" y="64" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle" opacity="0.8">+</text>
  
  <text x="145" y="85" font-family="sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="1">ARDUINO</text>
  <text x="145" y="105" font-family="sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">UNO</text>
  <text x="260" y="45" font-family="sans-serif" font-size="9" fill="#ffffff">DIGITAL (PWM~)</text>
  <text x="210" y="185" font-family="sans-serif" font-size="9" fill="#ffffff">ANALOG IN</text>
  <text x="105" y="185" font-family="sans-serif" font-size="9" fill="#ffffff">POWER</text>

  <!-- USB Port (Silver metallic block) -->
  <rect x="0" y="30" width="55" height="45" fill="url(#usbGrad)" rx="3" stroke="#888" stroke-width="1" />
  <rect x="5" y="35" width="45" height="35" fill="#CCCCCC" />
  <!-- USB details -->
  <path d="M 40 40 v 25" stroke="#999" stroke-width="2" />
  
  <!-- Power Jack (Black block with silver center pin) -->
  <rect x="0" y="150" width="45" height="35" fill="#1A1A1A" rx="2" />
  <rect x="5" y="153" width="35" height="29" fill="#111" />
  <circle cx="22" cy="167" r="8" fill="#0A0A0A" />
  <circle cx="22" cy="167" r="3" fill="#DCDCDC" />

  <!-- Reset Button -->
  <rect x="235" y="10" width="12" height="12" fill="#E0E0E0" />
  <circle cx="241" cy="16" r="4" fill="#F44336" />

  <!-- Status LEDs (RX, TX, ON, L) -->
  <rect x="180" y="110" width="6" height="4" fill="#FFC107" rx="1" />
  <text x="190" y="114" font-family="sans-serif" font-size="7" fill="#ffffff">RX</text>
  <rect x="180" y="120" width="6" height="4" fill="#FFC107" rx="1" />
  <text x="190" y="124" font-family="sans-serif" font-size="7" fill="#ffffff">TX</text>
  <rect x="230" y="110" width="6" height="4" fill="#00E676" rx="1" />
  <text x="240" y="114" font-family="sans-serif" font-size="7" fill="#ffffff">ON</text>
  <rect x="230" y="120" width="6" height="4" fill="#FFC107" rx="1" />
  <text x="240" y="124" font-family="sans-serif" font-size="7" fill="#ffffff">L</text>

  <!-- ATmega328P Microcontroller (DIP IC) -->
  <!-- Chip body -->
  <rect x="120" y="125" width="110" height="25" fill="#151515" rx="2" />
  <!-- Indent mark -->
  <path d="M 120 132 a 5 5 0 0 1 0 10" fill="#050505" />
  <!-- IC Legs (Silver) -->
  <g fill="#A0A0A0">
    <rect x="125" y="121" width="4" height="4" /><rect x="132" y="121" width="4" height="4" /><rect x="139" y="121" width="4" height="4" /><rect x="146" y="121" width="4" height="4" /><rect x="153" y="121" width="4" height="4" /><rect x="160" y="121" width="4" height="4" /><rect x="167" y="121" width="4" height="4" /><rect x="174" y="121" width="4" height="4" /><rect x="181" y="121" width="4" height="4" /><rect x="188" y="121" width="4" height="4" /><rect x="195" y="121" width="4" height="4" /><rect x="202" y="121" width="4" height="4" /><rect x="209" y="121" width="4" height="4" /><rect x="216" y="121" width="4" height="4" />
    <rect x="125" y="150" width="4" height="4" /><rect x="132" y="150" width="4" height="4" /><rect x="139" y="150" width="4" height="4" /><rect x="146" y="150" width="4" height="4" /><rect x="153" y="150" width="4" height="4" /><rect x="160" y="150" width="4" height="4" /><rect x="167" y="150" width="4" height="4" /><rect x="174" y="150" width="4" height="4" /><rect x="181" y="150" width="4" height="4" /><rect x="188" y="150" width="4" height="4" /><rect x="195" y="150" width="4" height="4" /><rect x="202" y="150" width="4" height="4" /><rect x="209" y="150" width="4" height="4" /><rect x="216" y="150" width="4" height="4" />
  </g>

  <!-- TOP HEADER (Digital Pins 0-13) -->
  <g id="top-headers">
    <rect x="70" y="10" width="200" height="14" fill="#1A1A1A" />
    <!-- Pin holes (14 pins) - Spacing: ~13.5px apart -->
    <g fill="#DCDCDC">
      <rect x="75" y="12" width="8" height="10" /><rect x="89" y="12" width="8" height="10" /><rect x="103" y="12" width="8" height="10" /><rect x="117" y="12" width="8" height="10" /><rect x="131" y="12" width="8" height="10" /><rect x="145" y="12" width="8" height="10" /><rect x="159" y="12" width="8" height="10" /><rect x="173" y="12" width="8" height="10" /><rect x="187" y="12" width="8" height="10" /><rect x="201" y="12" width="8" height="10" /><rect x="215" y="12" width="8" height="10" /><rect x="229" y="12" width="8" height="10" /><rect x="243" y="12" width="8" height="10" /><rect x="257" y="12" width="8" height="10" />
    </g>
    <!-- Text Labels -->
    <text x="79" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">AREF</text>
    <text x="93" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">GND</text>
    <text x="107" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">13</text>
    <text x="121" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">12</text>
    <text x="135" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">~11</text>
    <text x="149" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">~10</text>
    <text x="163" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">~9</text>
    <text x="177" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">8</text>
    <text x="191" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">7</text>
    <text x="205" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">~6</text>
    <text x="219" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">~5</text>
    <text x="233" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">4</text>
    <text x="247" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">~3</text>
    <text x="261" y="32" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">2</text>
  </g>

  <!-- BOTTOM HEADERS (Power & Analog) -->
  <g id="bottom-headers">
    <!-- Power block (8 pins total, we map 4: 3V3, 5V, GND, VIN in our JS) -->
    <rect x="70" y="196" width="112" height="14" fill="#1A1A1A" />
    <g fill="#DCDCDC">
      <rect x="75" y="198" width="8" height="10" /><rect x="89" y="198" width="8" height="10" /><rect x="103" y="198" width="8" height="10" /><rect x="117" y="198" width="8" height="10" /><rect x="131" y="198" width="8" height="10" /><rect x="145" y="198" width="8" height="10" /><rect x="159" y="198" width="8" height="10" /><rect x="173" y="198" width="8" height="10" />
    </g>
    <text x="107" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">3V3</text>
    <text x="121" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">5V</text>
    <text x="135" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">GND</text>
    <text x="149" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">GND</text>
    <text x="163" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">VIN</text>

    <!-- Analog block (6 pins) -->
    <rect x="190" y="196" width="86" height="14" fill="#1A1A1A" />
    <g fill="#DCDCDC">
      <rect x="195" y="198" width="8" height="10" /><rect x="209" y="198" width="8" height="10" /><rect x="223" y="198" width="8" height="10" /><rect x="237" y="198" width="8" height="10" /><rect x="251" y="198" width="8" height="10" /><rect x="265" y="198" width="8" height="10" />
    </g>
    <text x="199" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">A0</text>
    <text x="213" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">A1</text>
    <text x="227" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">A2</text>
    <text x="241" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">A3</text>
    <text x="255" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">A4</text>
    <text x="269" y="192" font-family="sans-serif" font-size="8" fill="#fff" text-anchor="middle">A5</text>
  </g>
</svg>
