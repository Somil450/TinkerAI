<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 95" width="130" height="95">
  <defs>
    <filter id="sh-vibration-sensor" x="-8%" y="-8%" width="116%" height="116%"><feDropShadow dx="1" dy="2" stdDeviation="2.5" flood-opacity="0.28"/></filter>
  </defs>
  <rect x="5" y="15" width="120" height="75" rx="4" fill="#03a9f4" stroke="#01579b" stroke-width="1.5" filter="url(#sh-vibration-sensor)"/>
  
  <!-- PIN HEADER BLACK BASE -->
  <rect x="40.0" y="6" width="46" height="14" rx="2" fill="#1a1a1a" stroke="#333"/>
  
        <rect x="44.0" y="7" width="8" height="10" fill="#bdbdbd" rx="1"/>
        <text x="48.0" y="5" text-anchor="middle" fill="#fff" font-size="5" font-weight="bold" font-family="Arial,sans-serif">VCC</text>
        
        <rect x="58.0" y="7" width="8" height="10" fill="#bdbdbd" rx="1"/>
        <text x="62.0" y="5" text-anchor="middle" fill="#fff" font-size="5" font-weight="bold" font-family="Arial,sans-serif">GND</text>
        
        <rect x="72.0" y="7" width="8" height="10" fill="#bdbdbd" rx="1"/>
        <text x="76.0" y="5" text-anchor="middle" fill="#fff" font-size="5" font-weight="bold" font-family="Arial,sans-serif">DO</text>
        
  
  <!-- CUSTOM GRAPHICS -->
  <rect x="50" y="45" width="30" height="10" fill="#111" rx="5"/><circle cx="55" cy="50" r="3" fill="#00bcd4"/>
  
  <!-- COMPONENT NAME -->
  <text x="65" y="85" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold" font-family="Arial,sans-serif" opacity="0.9">VIBRATION</text>
</svg>