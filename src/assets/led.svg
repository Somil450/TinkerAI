<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 120" width="60" height="120">
  <!-- Anode Leg (Left, Bent) -->
  <path d="M 22 110 L 22 75 L 16 65 L 16 50" stroke="#C8C8C8" stroke-width="4" fill="none" stroke-linejoin="round" />
  <!-- Cathode Leg (Right, Straight) -->
  <rect x="34" y="50" width="4" height="60" fill="#C8C8C8" />
  
  <!-- Bulb Base Rim -->
  <path d="M 11 48 h 38 v 8 a 2 2 0 0 1 -2 2 h -34 a 2 2 0 0 1 -2 -2 z" fill="#B71C1C" />
  <path d="M 11 48 h 38 v 2 h -38 z" fill="#FF5252" opacity="0.5" />

  <!-- Internal Components -->
  <g opacity="0.8">
    <!-- Anode Post -->
    <rect x="15" y="32" width="2" height="16" fill="#A0A0A0" />
    <path d="M 14 32 h 4 v -2 h -4 z" fill="#A0A0A0" />
    <!-- Cathode Anvil -->
    <path d="M 35 48 L 35 28 L 22 28 L 22 34 L 28 34 L 28 48 Z" fill="#909090" />
    <path d="M 22 26 h 14 v 2 h -14 z" fill="#B0B0B0" />
  </g>

  <!-- Bulb Dome (Transparent Red) -->
  <path d="M 13 48 v -20 a 17 17 0 0 1 34 0 v 20 z" fill="#F44336" opacity="0.85" />
  
  <!-- Shading & Highlights for 3D glass effect -->
  <!-- Inner shadow -->
  <path d="M 13 48 v -20 a 17 17 0 0 1 34 0 v 20 z" fill="none" stroke="#B71C1C" stroke-width="2" opacity="0.6" />
  <!-- Left curve highlight -->
  <path d="M 16 35 a 12 12 0 0 1 11 -18" stroke="#FFFFFF" stroke-width="2.5" fill="none" opacity="0.75" stroke-linecap="round" />
  <!-- Right edge rim light -->
  <path d="M 45 42 v -12" stroke="#FFCDD2" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round" />
</svg>
